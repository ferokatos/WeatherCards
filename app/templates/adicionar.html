{% extends "base.html" %}

{% block conteudo %}
    <div class="form-container">
        <h2 style="text-align: center; margin-bottom: var(--spacing-lg);">Adicionar Cidade</h2>
        
        <form method="POST" action="{{ url_for('cidades.adicionar') }}">
            <div class="form-group">
                <label for="cidade">Nome da Cidade</label>
                <input type="text" id="cidade" name="cidade" required placeholder="Ex: Maceió">
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">Buscar e Salvar</button>
        </form>
        
        <div style="text-align: center; margin-top: var(--spacing-md);">
            <a href="{{ url_for('cidades.index') }}" style="color: var(--primary-color);">Voltar ao Dashboard</a>
        </div>
    </div>
{% endblock %}
