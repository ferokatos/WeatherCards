{% extends "base.html" %}

{% block conteudo %}
    <div class="form-container">
        <h2 style="text-align: center; margin-bottom: var(--spacing-sm);">Editar: {{ cidade.nome }}, {{ cidade.pais }}</h2>
        
        <!-- Formulário de Refresh via API Externa -->
        <form method="POST" action="{{ url_for('cidades.editar', id=cidade.id) }}" style="text-align: center; margin-bottom: var(--spacing-lg);">
            <input type="hidden" name="acao" value="refresh">
            <button type="submit" class="btn" style="background-color: var(--success-color);">
                Refresh
            </button>
            <p style="font-size: 0.85rem; color: var(--text-light); margin-top: 5px;">
                Busca os dados mais recentes do clima no OpenWeather e sobrescreve.
            </p>
        </form>
        
        <hr style="margin-bottom: var(--spacing-lg); border: 0; border-top: 1px solid #e2e8f0;">

        <!-- Formulário Manual -->
        <form method="POST" action="{{ url_for('cidades.editar', id=cidade.id) }}">
            <input type="hidden" name="acao" value="manual">
            
            <div class="form-group">
                <label for="temperatura">Temperatura (°C)</label>
                <input type="number" step="0.1" id="temperatura" name="temperatura" value="{{ cidade.temperatura }}" required>
            </div>
            
            <div class="form-group">
                <label for="umidade">Umidade (%)</label>
                <input type="number" id="umidade" name="umidade" value="{{ cidade.umidade }}" required>
            </div>

            <div class="form-group">
                <label for="vento">Vento (m/s)</label>
                <input type="number" step="0.1" id="vento" name="vento" value="{{ cidade.vento }}" required>
            </div>

            <div class="form-group">
                <label for="condicao">Condição</label>
                <input type="text" id="condicao" name="condicao" value="{{ cidade.condicao }}" required>
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">Salvar Alterações Manuais</button>
        </form>
        
        <div style="text-align: center; margin-top: var(--spacing-md);">
            <a href="{{ url_for('cidades.index') }}" style="color: var(--primary-color);">Voltar ao Dashboard</a>
        </div>
    </div>
{% endblock %}
