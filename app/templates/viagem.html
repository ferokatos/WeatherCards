{% extends "base.html" %}

{% block conteudo %}
<div style="max-width: 500px; margin: 60px auto; padding: 0 20px; font-family: sans-serif;">
    <div style="background-color: #2c3e50; color: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);">
        <h3 style="text-align: center; font-weight: bold; margin-top: 0; margin-bottom: 25px; font-size: 1.5rem; letter-spacing: -0.5px;">Planejar Viagem</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div style="background-color: #e74c3c; color: white; padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 20px; font-size: 0.9rem;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('viagem.planejar') }}" method="POST">
            <div style="margin-bottom: 20px;">
                <label for="origem" style="display: block; font-size: 0.8rem; font-weight: bold; text-uppercase: uppercase; color: #cbd5e1; margin-bottom: 8px; letter-spacing: 0.5px;">Cidade de Origem</label>
                <select name="origem" id="origem" required style="width: 100%; height: 45px; background-color: #1a202c; color: #ffffff; border: 1px solid #4a5568; border-radius: 6px; padding: 0 12px; font-size: 0.95rem; outline: none; box-sizing: border-box;">
                    <option value="" disabled selected>Selecione o ponto de partida...</option>
                    {% for cidade in cidades %}
                        <option value="{{ cidade.nome }}">{{ cidade.nome }}, {{ cidade.pais }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom: 30px;">
                <label for="destino" style="display: block; font-size: 0.8rem; font-weight: bold; text-uppercase: uppercase; color: #cbd5e1; margin-bottom: 8px; letter-spacing: 0.5px;">Cidade de Destino</label>
                <select name="destino" id="destino" required style="width: 100%; height: 45px; background-color: #1a202c; color: #ffffff; border: 1px solid #4a5568; border-radius: 6px; padding: 0 12px; font-size: 0.95rem; outline: none; box-sizing: border-box;">
                    <option value="" disabled selected>Selecione o ponto de destino...</option>
                    {% for cidade in cidades %}
                        <option value="{{ cidade.nome }}">{{ cidade.nome }}, {{ cidade.pais }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" style="width: 100%; height: 45px; background-color: #3498db; color: #ffffff; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                Analisar Percurso
            </button>
        </form>
    </div>
</div>
{% endblock %}
